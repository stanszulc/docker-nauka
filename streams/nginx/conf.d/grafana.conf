server {
    listen 80;
    server_name grafana.stsconsulting.pl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grafana.stsconsulting.pl;

    ssl_certificate /etc/letsencrypt/live/grafana.stsconsulting.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grafana.stsconsulting.pl/privkey.pem;

    location / {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
