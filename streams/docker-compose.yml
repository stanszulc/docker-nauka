version: "3.9"

services:
  # =========================
  # Zookeeper
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # =========================
  # Kafka broker
  # =========================
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: kafka
      POSTGRES_PASSWORD: kafka
      POSTGRES_DB: events
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # =========================
  # Consumer (Kafka → PostgreSQL)
  # =========================
  consumer:
    build: ./consumer
    container_name: consumer
    depends_on:
      - kafka
      - postgres
    restart: on-failure

  # =========================
  # Event generators
  # =========================
  login:
    build: ./login
    container_name: login
    depends_on:
      - kafka

  click:
    build: ./click
    container_name: click
    depends_on:
      - kafka

  purchase:
    build: ./purchase
    container_name: purchase
    depends_on:
      - kafka

  traffic:
    build: ./traffic
    depends_on:
      - kafka
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    restart: on-failure

  route:
    build: ./route
    depends_on:
      - kafka
    restart: on-failure

  commute:
    build: ./commute
    depends_on:
      - kafka
    restart: on-failure

  # =========================
  # Grafana
  # =========================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - postgres
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json
      - ./grafana/eshop_dashboard.json:/var/lib/grafana/dashboards/eshop_dashboard.json

  # =========================
  # AI Agents
  # =========================
  agent_raport:
    build: ./agent_raport
    container_name: agent_raport
    depends_on:
      - postgres
    env_file:
      - .env
    restart: on-failure

  agent_eshop:
    build: ./agent_eshop
    container_name: agent_eshop
    depends_on:
      - postgres
    env_file:
      - .env
    restart: on-failure

  agent_sql:
    build: ./agent_sql
    container_name: agent_sql
    depends_on:
      - postgres
    restart: on-failure

volumes:
  postgres_data:
  grafana_data:
